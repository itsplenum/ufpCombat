services:
  web:
    build: .
    restart: unless-stopped
    # Email relay for the forms (Resend). Optional: without a .env the site runs
    # fine and submissions stay in `docker compose logs web`. See .env.example.
    env_file:
      - path: .env
        required: false
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
