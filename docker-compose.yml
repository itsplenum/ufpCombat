# UFP is one app on a shared multi-app host: a single Caddy reverse proxy (in
# ~/infra/proxy) terminates TLS for every domain and routes to each app by
# container name over the external "edge" network. So this compose ships only
# the app itself — no Caddy, no published ports — and joins that shared network.
services:
  web:
    build: .
    container_name: ufp-web
    restart: unless-stopped
    # Email relay for the forms (Resend). Optional: without a .env the site runs
    # fine and submissions stay in `docker compose logs web`. See .env.example.
    env_file:
      - path: .env
        required: false
    expose:
      - "3000"
    networks:
      - edge

networks:
  # Created once on the host: `docker network create edge`. Shared with the
  # reverse proxy so it can reach ufp-web:3000.
  edge:
    external: true
